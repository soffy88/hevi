---
# hevi v6 — Cloudflare Tunnel 本地全栈部署
#
# 依赖: 平台 pg/minio 容器已在运行(hevi-dev-postgres-1 @ :5432, hevi-dev-minio-1 @ :9100)
# 不起 pg/minio/nginx/Redis 容器(obase.cache=文件系统 pickle)
#
# 起服务:
#   eval $(ssh-agent -s) && ssh-add ~/.ssh/id_ed25519
#   DOCKER_BUILDKIT=1 docker compose -f deploy/docker-compose-cftunnel.yml up -d --build
#
# 隧道目标(交 Wiki cloudflared 配置):
#   hevi-api : http://localhost:8201   →  https://api.hevi.kanpan.co  (或路径路由 /api/*)
#   hevi-web : http://localhost:3200   →  https://hevi.kanpan.co
#   注: 8200 与 tide-api 冲突,已改用 8201(2026-07-02)

name: hevi-cftunnel

services:
  hevi-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql://hevi:hevi@host.docker.internal:5432/hevi
      MINIO_ENDPOINT: host.docker.internal:9100
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-hevi}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-hevi1234}
      MINIO_BUCKET: ${MINIO_BUCKET:-hevi-assets}
      CORS_ORIGINS: https://hevi.kanpan.co
      VIBEVOICE_MODEL_DIR: /models/vibevoice-1.5b
      WAN2GP_DIR: /Wan2GP
      HEVI_LLM_PROVIDER: qwen_local
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b
      # 共享 RTX 3080 上另有租户常占 ~2.4GiB,不加这个 sdxl_local 关键帧 VAE decode 峰值会
      # CUDA OOM(2026-07-16 实证:加此 env 后本地出图/img2img 才成)。缺它 → engine=local
      # 关键帧全挂、退云端额度墙 → canon,v1/v2 关键帧路(含 SPEC-004 v2 朝向 img2img)全废。
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      # 消耗单价:credits_per_usd 默认 100(estimated_credits = cost_usd × 此值)。这台是 soffy
      # 自用测试实例,降到 10(每次产集扣的积分 1/10),配合手动授信足够反复测,不受额度墙卡。
      CREDITS_PER_USD: "10"
      # 测试用:剧本只取前 4 场(下游 ~20 镜/~90s),快速小规模验证剧本细节达标。验证 OK 后
      # 删掉这行重建即恢复全量(一段故事 ~11 场/~53 镜/~4min)。见 config.director_max_scenes。
      DIRECTOR_MAX_SCENES: "4"
    volumes:
      - /home/soffy/models:/models:ro
      - /home/soffy/Wan2GP:/Wan2GP:ro
      - /home/soffy/projects/hevi/output:/app/output
      # 主机已有的 HF 缓存(含 openai/clip-vit-base-patch32)只读挂进来,让
      # subjects/subject_embed.py 能算角色身份向量(local_files_only=True)——
      # 治"人物存了但没向量资产化",同时启用角色一致性 CLIP 打分。
      - /home/soffy/.cache/huggingface:/root/.cache/huggingface:ro
      # SDXL base + IP-Adapter + fp16 VAE 权重(settings.sdxl_model_dir 默认路径),
      # 让容器内 sdxl_local 关键帧引擎(engine="local")能加载模型在 GPU 上出锁脸/摆姿势
      # 关键帧——不挂则 engine=local 找不到权重、退回云端 edit(免费额度墙)→ canon。
      - /data/models/huggingface:/data/models/huggingface:ro
    ports:
      - "8201:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn hevi.api.main:app --host 0.0.0.0 --port 8000 --workers 1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  hevi-web:
    build:
      context: ../hevi-web
      dockerfile: ../deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE: https://hevi.kanpan.co
        NEXT_PUBLIC_USE_MOCK: "false"
    restart: unless-stopped
    ports:
      - "3200:3000"
    depends_on:
      hevi-api:
        condition: service_healthy
    # Next.js 生产镜像不含 curl → 原 curl healthcheck 恒失败(假 unhealthy)。
    # 改用 node 自带 http 探活(node 必然存在)。
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: hevi-cftunnel_default
    external: true
