---
# hevi v6 — Cloudflare Tunnel 本地全栈部署
#
# 依赖: 平台 pg/minio 容器已在运行(hevi-dev-postgres-1 @ :5432, hevi-dev-minio-1 @ :9100)
# 不起 pg/minio/nginx/Redis 容器(obase.cache=文件系统 pickle)
#
# 起服务:
#   eval $(ssh-agent -s) && ssh-add ~/.ssh/id_ed25519
#   DOCKER_BUILDKIT=1 docker compose -f deploy/docker-compose-cftunnel.yml up -d --build
#
# 隧道目标(交 Wiki cloudflared 配置):
#   hevi-api : http://localhost:8201   →  https://api.hevi.uex.hk  (或路径路由 /api/*)
#   hevi-web : http://localhost:3200   →  https://hevi.uex.hk
#   注: 8200 与 tide-api 冲突,已改用 8201(2026-07-02)

name: hevi-cftunnel

services:
  hevi-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql://hevi:hevi@host.docker.internal:5432/hevi
      MINIO_ENDPOINT: host.docker.internal:9100
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-hevi}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-hevi1234}
      MINIO_BUCKET: ${MINIO_BUCKET:-hevi-assets}
      CORS_ORIGINS: https://hevi.uex.hk
      VIBEVOICE_MODEL_DIR: /models/vibevoice-1.5b
      WAN2GP_DIR: /Wan2GP
      HEVI_LLM_PROVIDER: qwen_local
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b
    volumes:
      - /home/soffy/models:/models:ro
      - /home/soffy/Wan2GP:/Wan2GP:ro
      - /home/soffy/projects/hevi/output:/app/output
    ports:
      - "8201:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn hevi.api.main:app --host 0.0.0.0 --port 8000 --workers 1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  hevi-web:
    build:
      context: ../hevi-web
      dockerfile: ../deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE: https://hevi.uex.hk
        NEXT_PUBLIC_USE_MOCK: "false"
    restart: unless-stopped
    ports:
      - "3200:3000"
    depends_on:
      hevi-api:
        condition: service_healthy
    # Next.js 生产镜像不含 curl → 原 curl healthcheck 恒失败(假 unhealthy)。
    # 改用 node 自带 http 探活(node 必然存在)。
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: hevi-cftunnel_default
    external: true
