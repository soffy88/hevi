name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH for private deps
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HELIOS_DEPLOY_KEY }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Setup Python 3.14
        run: uv python install 3.14

      - name: Install deps
        run: uv sync

      - name: Ruff
        run: uv run ruff check hevi tests

      - name: Mypy
        run: uv run mypy --strict hevi

      - name: Pytest
        run: uv run pytest tests/ --cov=hevi --cov-report=term --cov-fail-under=80

      # 依赖漏洞扫描(先非阻塞:报告已知 CVE,后续可转阻塞)
      - name: Dependency audit (pip-audit)
        continue-on-error: true
        run: uvx pip-audit || true

  # 前端构建门禁 —— 拦住"tsc 过但 next build 崩"(如 @helios/oui 升版删了导出)。
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hevi-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install web deps
        run: npm ci --prefer-offline --no-audit
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build
