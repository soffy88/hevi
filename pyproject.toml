[project]
name = "hevi"
version = "6.0.0"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic[email]>=2.10",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "argon2-cffi>=23.1",
    "pyjwt[crypto]>=2.10",
    # 主库 B路径 git+ssh (L-024)
    # obase[cache]: redis extra; PgPool 依赖 asyncpg (已在 base)
    "obase[cache,docker] @ git+ssh://git@github.com/helios-plat/obase.git@v0.14.1",
    # oprim: v3.6.1
    "oprim @ git+ssh://git@github.com/helios-plat/oprim.git@v3.6.1",
    "oskill @ git+ssh://git@github.com/helios-plat/oskill.git@v3.22.0",
    "omodul @ git+ssh://git@github.com/helios-plat/omodul.git@v1.28.0",
    "prometheus-client>=0.25.0",
    "psycopg2-binary>=2.9.12",
    "minio>=7.2.20",
    "torch>=2.12.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "mypy>=1.13",
    "ruff>=0.8",
]

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
strict = true
python_version = "3.14"
exclude = ["hevi/db/alembic/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.metadata]
allow-direct-references = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
