# hevi v6 — nginx reverse proxy
# Features: HTTPS termination, SSE long-connection, MCP Streamable HTTP

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl;
    http2 on;
    server_name hevi.example.com;   # Wiki: 替换为真实域名

    ssl_certificate     /etc/letsencrypt/live/hevi.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hevi.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── SSE endpoints (任务进度 / 画布执行进度) ──────────────────────────────
    # proxy_buffering off 是 SSE 的关键: nginx 必须立即转发 data: 帧
    location ~ ^/api/(tasks|canvas)/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE 必需: 禁用缓冲, 清除 Connection 头, 超长 timeout
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection '';
        proxy_read_timeout 3600s;   # 长视频任务可能耗时数十分钟
        proxy_send_timeout 3600s;
        keepalive_timeout  3600s;

        # 关闭 gzip (SSE 流不能压缩)
        gzip off;
    }

    # ── MCP Streamable HTTP (/mcp) ────────────────────────────────────────────
    # MCP 2025-03+ Streamable HTTP: 同样需要禁缓冲 + 长 timeout
    location /mcp {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── 普通 API (/api) ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 100m;
    }

    # ── Metrics (仅内网可访问) ────────────────────────────────────────────────
    location /metrics {
        proxy_pass http://app:8000;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
    }

    # ── Health (公开,用于 LB 检查) ───────────────────────────────────────────
    location /api/health {
        proxy_pass http://app:8000;
        access_log off;
    }
}
